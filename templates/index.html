<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Classification AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <div class="container">

        <div class="card shadow-lg">

            <h1 class="title">
                🍎 Fruit Classification AI
            </h1>

            <p class="subtitle">
                Implementasi Transfer Learning MobileNetV2 untuk Klasifikasi Jenis Buah
            </p>

            <form method="POST" enctype="multipart/form-data">

                <input class="form-control mb-3" type="file" name="image" accept="image/*" required>

                <button class="btn btn-success w-100">
                    🔍 Prediksi Gambar
                </button>

            </form>

            {% if image_path %}

            <div class="text-center mt-4">

                <img src="{{ image_path }}" class="preview-img">

            </div>

            {% endif %}

            {% if result %}

            <div class="result-box">

                <h3>
                    Hasil Prediksi
                </h3>

                <h2 class="fruit-name">

                    {{ result }}

                </h2>

                <h5>

                    Confidence

                </h5>

                <div class="progress">

                    <div class="progress-bar bg-success" role="progressbar" style="width: {{ confidence }}%;">

                        {{ "%.2f"|format(confidence) }}%

                    </div>

                </div>

            </div>

            {% endif %}

        </div>

    </div>

</body>

</html>
